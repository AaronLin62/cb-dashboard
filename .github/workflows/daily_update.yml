name: 每日可轉債資料自動更新

# 設定觸發條件
on:
  schedule:
    # 這是 UTC 時間，台灣時間 16:00 等於 UTC 的 08:00
    # 這裡設定為每天台灣時間下午 4 點執行
    - cron: '0 8 * * *' 
  workflow_dispatch: # 保留一個按鈕，讓您可以隨時手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest # 借用一台免費的 Linux 雲端電腦

    steps:
    - name: 📥 下載程式碼
      uses: actions/checkout@v3

    - name: 🛠️ 安裝 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # 指定 Python 版本

    - name: 📦 安裝所需套件
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas supabase

    - name: 🚀 執行爬蟲腳本更新資料庫
      env:
        # 從 GitHub Secrets 拿出鑰匙，交給 Python
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        python auto_pipeline.py
